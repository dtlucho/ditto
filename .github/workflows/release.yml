name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF_NAME}"
          OUTPUT="ditto"
          if [ "$GOOS" = "windows" ]; then
            OUTPUT="ditto.exe"
          fi
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "${OUTPUT}" .

      - name: Package archive
        id: package
        run: |
          NAME="ditto_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "dist/${NAME}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp ditto.exe README.md ROADMAP.md "dist/${NAME}/"
            cd dist && zip -r "${NAME}.zip" "${NAME}"
            echo "asset=dist/${NAME}.zip" >> "$GITHUB_OUTPUT"
          else
            cp ditto README.md ROADMAP.md "dist/${NAME}/"
            cd dist && tar -czf "${NAME}.tar.gz" "${NAME}"
            echo "asset=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.package.outputs.asset }}
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
