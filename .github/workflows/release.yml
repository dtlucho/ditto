name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF_NAME}"
          OUTPUT="ditto"
          if [ "$GOOS" = "windows" ]; then
            OUTPUT="ditto.exe"
          fi
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "${OUTPUT}" .

      - name: Package archive
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NAME="ditto_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"

          if [ "${{ matrix.goos }}" = "darwin" ]; then
            # Build Ditto.app bundle for macOS
            APP="dist/${NAME}/Ditto.app"
            mkdir -p "${APP}/Contents/MacOS"
            mkdir -p "${APP}/Contents/Resources"

            # Copy binary, icon, Info.plist
            cp ditto "${APP}/Contents/MacOS/ditto"
            cp packaging/Info.plist "${APP}/Contents/Info.plist"
            # Update version in Info.plist
            sed -i "s/1.0.0/${VERSION}/g" "${APP}/Contents/Info.plist"
            # Copy launcher script
            cp packaging/launcher.sh "${APP}/Contents/MacOS/launcher"
            chmod +x "${APP}/Contents/MacOS/launcher"
            chmod +x "${APP}/Contents/MacOS/ditto"
            # Copy icon
            cp ditto.icns "${APP}/Contents/Resources/ditto.icns"

            # Also include the raw binary + docs at the top level for CLI users
            cp ditto "dist/${NAME}/ditto"
            cp README.md ROADMAP.md "dist/${NAME}/"

            # Create example mocks directory
            mkdir -p "dist/${NAME}/mocks"
            cp mocks/example.json "dist/${NAME}/mocks/"

            # Package as .zip (macOS users can double-click to extract)
            cd dist && zip -r "${NAME}.zip" "${NAME}"
            echo "asset=dist/${NAME}.zip" >> "$GITHUB_OUTPUT"

          elif [ "${{ matrix.goos }}" = "windows" ]; then
            mkdir -p "dist/${NAME}/mocks"
            cp ditto.exe README.md ROADMAP.md "dist/${NAME}/"
            cp mocks/example.json "dist/${NAME}/mocks/"
            cd dist && zip -r "${NAME}.zip" "${NAME}"
            echo "asset=dist/${NAME}.zip" >> "$GITHUB_OUTPUT"

          else
            # Linux: tar.gz
            mkdir -p "dist/${NAME}/mocks"
            cp ditto README.md ROADMAP.md "dist/${NAME}/"
            cp mocks/example.json "dist/${NAME}/mocks/"
            cd dist && tar -czf "${NAME}.tar.gz" "${NAME}"
            echo "asset=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.package.outputs.asset }}
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
