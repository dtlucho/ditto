name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # macOS desktop app (Wails)
  build-macos:
    name: Build macOS ${{ matrix.goarch }}
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails app
        run: |
          VERSION="${GITHUB_REF_NAME}"
          wails build -skipbindings -ldflags "-X main.version=${VERSION}" -platform darwin/${{ matrix.goarch }}

      - name: Package archive
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NAME="ditto_${VERSION}_darwin_${{ matrix.goarch }}"

          mkdir -p "dist/${NAME}"
          cp -R build/bin/Ditto.app "dist/${NAME}/Ditto.app"
          cp README.md ROADMAP.md "dist/${NAME}/"

          cd dist && zip -r "${NAME}.zip" "${NAME}"
          echo "asset=dist/${NAME}.zip" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.goarch }}
          path: ${{ steps.package.outputs.asset }}
          retention-days: 1

  # Linux desktop app (Wails) — amd64 only, needs webkit2gtk-4.0 (Ubuntu 22.04)
  build-linux-desktop:
    name: Build Linux amd64 (desktop)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails app
        run: |
          VERSION="${GITHUB_REF_NAME}"
          wails build -skipbindings -ldflags "-X main.version=${VERSION}" -platform linux/amd64

      - name: Package archive
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NAME="ditto_${VERSION}_linux_amd64"

          mkdir -p "dist/${NAME}"
          cp build/bin/ditto "dist/${NAME}/ditto"
          cp README.md ROADMAP.md "dist/${NAME}/"

          cd dist && tar -czf "${NAME}.tar.gz" "${NAME}"
          echo "asset=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: ${{ steps.package.outputs.asset }}
          retention-days: 1

  # Linux arm64 headless (no Wails — CGO cross-compilation not supported)
  build-linux-arm64:
    name: Build Linux arm64 (headless)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF_NAME}"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o ditto .

      - name: Package archive
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NAME="ditto_${VERSION}_linux_arm64"

          mkdir -p "dist/${NAME}/mocks"
          cp ditto README.md ROADMAP.md "dist/${NAME}/"
          cp mocks/example.json "dist/${NAME}/mocks/"

          cd dist && tar -czf "${NAME}.tar.gz" "${NAME}"
          echo "asset=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: ${{ steps.package.outputs.asset }}
          retention-days: 1

  # Windows desktop app (Wails)
  build-windows:
    name: Build Windows amd64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails app
        run: |
          $VERSION = "${{ github.ref_name }}"
          wails build -skipbindings -ldflags "-X main.version=$VERSION" -platform windows/amd64

      - name: Package archive
        id: package
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          $NAME = "ditto_${VERSION}_windows_amd64"

          New-Item -ItemType Directory -Force -Path "dist\$NAME"
          Copy-Item "build\bin\ditto.exe" "dist\$NAME\ditto.exe"
          Copy-Item "README.md" "dist\$NAME\"
          Copy-Item "ROADMAP.md" "dist\$NAME\"

          Compress-Archive -Path "dist\$NAME" -DestinationPath "dist\$NAME.zip"
          "asset=dist/$NAME.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: ${{ steps.package.outputs.asset }}
          retention-days: 1

  release:
    name: Publish release
    needs: [build-macos, build-linux-desktop, build-linux-arm64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
